---
# AWS ALB Ingress Configuration (Optional)
# Prerequisites:
# 1. AWS ALB Ingress Controller must be installed in your EKS cluster
# 2. An AWS Application Load Balancer (ALB) will be created
# 3. Update the 'host' field with your domain name
# 4. Update the 'alb.ingress.kubernetes.io/certificate-arn' with your ACM certificate ARN

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-webserver-ingress
  namespace: default
  annotations:
    # AWS ALB Controller annotations
    alb.ingress.kubernetes.io/load-balancer-name: simple-webserver-alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # Uncomment to enable HTTPS with ACM certificate
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:region:account-id:certificate/certificate-id
    
    # Health check configuration
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
spec:
  rules:
    # Update the host with your domain name
    - host: simple-webserver.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: simple-webserver-service
                port:
                  number: 80
status:
  loadBalancer: {}